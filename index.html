<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<title>Unregelmäßige Verben - Vokabelspiel MA</title>
<link rel="stylesheet" href="theme.css" />
</head>
<body class="day">

<!-- ✅ NEU: Logo -->

<img src="logo.png" id="logo">
<h1 id="gameTitle">Vokabelspiel MA 🎮</h1>

<select id="themeSelector">
<option value="day">Tagesmodus</option>
<option value="night">Nachtmodus</option>
</select>

<div id="startScreen">

  <div class="start-box">

    <label>Dein Name:
      <input id="playerName" placeholder="Name eingeben">
    </label>

    <label>Gesamtzeit wählen:
      <select id="timeSelector">
        <option value="60">1 Minute</option>
        <option value="180">3 Minuten</option>
        <option value="300">5 Minuten</option>
  <option value="600">10 Minuten</option>
  <option value="1020">17 Minuten</option>
      </select>
    </label>

    <button id="startBtn">Spiel starten</button>

  </div>

</div>



<div id="gameWrapper">

  <div id="gameArea">

<div id="status" style="display:none;">

<div class="box score-box">
  <span>Punkte:</span>
  <span id="punkte">0</span>
</div>



<div class="box" id="comboBox">
  🔥 Combo x0
</div>


  <div class="box">
    <span>Gesamtzeit:</span>
    <span id="gesamtzeit">0</span>
  </div>

<div class="box" id="fortschrittText">
  0 / 0
</div>
  <div id="leben" class="box">❤️❤️❤️</div>

  <!-- 🔥 HIER rein -->

  <button id="pauseBtn">⏸</button>
<button id="backBtn">🏠</button>

</div>

 

    <div id="wort"></div>

<div id="timerBarContainer" style="display:none;">
  <div id="timerBar"></div>
</div>



<div id="progressContainer" style="display:none;">
  <div id="progressBar" class="level2"></div>
</div>

    <div id="antworten"></div>
    <div id="feedback"></div>

  </div>

  <div id="highscoresContainer">
    <div id="highscoreList2" class="highscoreBox"></div>
  </div>

</div>


</div>

<div id="top10Popup"></div>
<div id="overlay"></div>
<div id="timeOverPopup"></div>

<audio id="richtig" src="sound.mp3"></audio>
<audio id="falsch" src="falsch.mp3"></audio>
<script src="main.js"></script>

<!-- 🐘 ELEFANT -->
<img src="elefant.png" id="jubelElefant">
<div id="elefantGlow"></div>

<div id="footer">
  © 2026 miStudia.de - Markus Autsch – Vokabelspiel MA
</div>

</body>


</html>

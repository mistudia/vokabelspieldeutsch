<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mathe-Waage Modern</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
        linear-gradient(
            135deg,
            #fde047,
            #facc15,
            #f59e0b
        );

    min-height:100vh;

    font-family:
        Inter,
        Arial,
        sans-serif;

color:#1e293b;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;
}

.app{

    width:1200px;

background:
    rgba(255,255,255,0.65);

    border:
        1px solid rgba(255,255,255,0.08);

    backdrop-filter: blur(16px);

    border-radius:30px;

    padding:30px;

    box-shadow:
        0 20px 60px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    font-size:42px;
    margin-bottom:30px;
}

.top{

    display:flex;
    gap:20px;
    justify-content:center;
    align-items:center;

    margin-bottom:25px;
}

input{

    width:500px;

    background:#0f172a;

    border:none;

    border-radius:16px;

    padding:18px;

    color:white;

    font-size:22px;
}

button{

    border:none;

    border-radius:16px;

    padding:14px 24px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
}

.primary{
    background:#38bdf8;
    color:black;
}

.controls{

    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;

    margin-top:15px;
    margin-bottom:25px;
}

.controls button{

    background:#1e293b;
    color:white;

    min-width:90px;
}

.controls button:hover{
    background:#334155;
}

#equationView{

    text-align:center;

    font-size:34px;

    font-weight:700;

    margin-bottom:20px;

    color:#1e293b;
}

canvas{

    width:100%;
    height:600px;

background:
    linear-gradient(
        to bottom,
        #fff8cc,
        #fff3a3
    );

    border-radius:24px;

    border:
        1px solid rgba(255,255,255,0.08);
}

.info{

    text-align:center;

    margin-top:20px;

    color:#94a3b8;

    font-size:18px;
}

select{

    border:none;

    border-radius:16px;

    padding:14px 20px;

    font-size:18px;

    background:#1e293b;

    color:white;

    cursor:pointer;

    min-width:120px;
}

.header{

    display:flex;

    align-items:center;

    gap:20px;

    margin-bottom:25px;
}

.logo{

    width:140px;

    height:auto;

    object-fit:contain;
}

.titleBlock{

    display:flex;

    flex-direction:column;
}

.subtitle{

    font-size:20px;

    color:#475569;

    margin-top:5px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">

    <img
        src="logo.png"
        class="logo"
    >

    <div class="titleBlock">

        <h1>⚖️ Mathe-Waage</h1>

        <div class="subtitle">
            Gleichungen veranschaulichen
        </div>

    </div>

</div>

<div class="top">

<input
    id="equationInput"
    value="2x-4x+7=x+5"
/>

<button
    class="primary"
    onclick="loadEquation()"
>
Start
</button>

</div>

<div id="equationView"></div>

<div class="controls">

<button onclick="applyOperation('+',1)">+1</button>
<button onclick="applyOperation('-',1)">-1</button>

<button onclick="applyOperation('+',2)">+2</button>
<button onclick="applyOperation('-',2)">-2</button>

<button onclick="applyMultiply(2)">·2</button>
<button onclick="multiplyByNegativeOne()">
·(-1)
</button>
<select onchange="divideDropdown(this.value)">

    <option value="">
        ÷ Zahl
    </option>

    <option value="2">
        ÷2
    </option>

    <option value="3">
        ÷3
    </option>

    <option value="5">
        ÷5
    </option>

    <option value="7">
        ÷7
    </option>

</select>

<button onclick="applyXOperation('+',2)">
+2x
</button>

<button onclick="applySingleX('+')">
+x
</button>

<button onclick="applySingleX('-')">
-x
</button>

<button onclick="multiplyByX()">
·x
</button>

<button onclick="divideByX()">
÷x
</button>

<button onclick="applyXOperation('-',2)">
-2x
</button>

<button onclick="applyXMultiply(2)">
·2x
</button>

<button onclick="applyXDivide(2)">
÷2x
</button>

<button onclick="simplifyEquation()">
✨ Vereinfachen
</button>

</div>

<canvas
    id="canvas"
    width="1200"
    height="600"
></canvas>

<div class="info">
Gib eine Gleichung ein und forme sie interaktiv um.
</div>

</div>

<script>

const canvas =
    document.getElementById("canvas");

const ctx =
    canvas.getContext("2d");

let equation = {
    left:{x:0,c:0},
    right:{x:0,c:0}
};


// ===================================
// PARSEN
// ===================================

function parseSide(side){

    let xCoeff = 0;
    let constant = 0;

    side = side.replace(/-/g,"+-");

    let terms = side.split("+");

    terms.forEach(term=>{

        term = term.trim();

        if(term==="") return;

        if(term.includes("x")){

            let coeff =
                term.replace("x","");

            if(coeff==="")
                coeff=1;

            if(coeff==="-")
                coeff=-1;

            xCoeff += Number(coeff);

        }else{

            constant += Number(term);
        }
    });

    return {
        x:xCoeff,
        c:constant
    };
}


// ===================================
// LADEN
// ===================================

function loadEquation(){

    let eq =
        document.getElementById(
            "equationInput"
        ).value;

    let sides = eq.split("=");

    equation.left =
        parseSide(sides[0]);

    equation.right =
        parseSide(sides[1]);

    redraw();
}


// ===================================
// TEXT
// ===================================

function sideToString(side){

    let txt = "";

    if(side.x !== 0){

        if(side.x === 1)
            txt += "x";

        else if(side.x === -1)
            txt += "-x";

        else
            txt += side.x + "x";
    }

    if(side.c > 0){

        if(txt!=="")
            txt += "+";

        txt += side.c;
    }

    if(side.c < 0){

        txt += side.c;
    }

    if(txt==="")
        txt="0";

    return txt;
}


// ===================================
// ZEICHNEN
// ===================================

function redraw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawBalance();

    drawSide(
        equation.left,
        300
    );

    drawSide(
        equation.right,
        900
    );

    document.getElementById(
        "equationView"
    ).innerHTML =

        sideToString(equation.left)
        +
        " = "
        +
        sideToString(equation.right);
}


// ===================================
// WAAGE
// ===================================

function drawBalance(){

    ctx.save();

    // Balken
    ctx.fillStyle="#94a3b8";

    roundRect(
        250,
        310,
        700,
        18,
        10
    );

    ctx.fill();

    // Mitte
    ctx.beginPath();

    ctx.arc(
        600,
        320,
        45,
        0,
        Math.PI*2
    );

    ctx.fillStyle="#cbd5e1";

    ctx.fill();

    // Stütze
    ctx.beginPath();

    ctx.moveTo(560,520);

    ctx.lineTo(640,520);

    ctx.lineTo(600,340);

    ctx.closePath();

    ctx.fillStyle="#64748b";

    ctx.fill();

    // Sockel
    roundRect(
        500,
        520,
        200,
        25,
        12
    );

    ctx.fill();

    drawPlate(300);

    drawPlate(900);

    ctx.restore();
}


// ===================================
// TELLER
// ===================================

function drawPlate(x){

    ctx.beginPath();

    ctx.ellipse(
        x,
        250,
        150,
        60,
        0,
        0,
        Math.PI
    );

    ctx.fillStyle="#dbeafe";

    ctx.fill();

    ctx.lineWidth=5;

    ctx.strokeStyle="#cbd5e1";

    ctx.stroke();

    ctx.beginPath();

    ctx.moveTo(x,250);

    ctx.lineTo(x,310);

    ctx.stroke();
}


// ===================================
// OBJEKTE
// ===================================

// ===================================
// BRUCHDARSTELLUNG
// ===================================

function toFraction(value){

    if(Number.isInteger(value))
        return value.toString();

    const tolerance = 0.0001;

    let denominators =
        [2,3,4,5,6,8,10,12];

    for(let d of denominators){

        let n = Math.round(value * d);

        if(Math.abs(value - n/d) < tolerance){

            if(n === d)
                return "1";

            return n + "/" + d;
        }
    }

    return value.toFixed(2);
}

function drawSide(side,centerX){

    let items = [];

    // =========================
    // X BOXEN
    // =========================

    let xAbs = Math.abs(side.x);

    let xWhole = Math.floor(xAbs);

    let xFraction = xAbs - xWhole;

    // Ganze x
    for(let i=0;i<xWhole;i++){

        items.push({
            type:"x",
            label:"x",
            negative:side.x<0
        });
    }

    // Bruch-x
    if(xFraction > 0.001){

        items.push({
            type:"x",
            label:toFraction(xFraction) + "x",
            negative:side.x<0
        });
    }


    // =========================
    // ZAHLEN
    // =========================

    let cAbs = Math.abs(side.c);

    let cWhole = Math.floor(cAbs);

    let cFraction = cAbs - cWhole;

    // Ganze Kugeln
    for(let i=0;i<cWhole;i++){

        items.push({
            type:"1",
            label:"1",
            negative:side.c<0
        });
    }

    // Bruchkugel
    if(cFraction > 0.001){

        items.push({
            type:"1",
            label:toFraction(cFraction),
            negative:side.c<0
        });
    }


    // =========================
    // ZEICHNEN
    // =========================

    items.forEach((item,index)=>{

        let col = index % 5;
        let row = Math.floor(index/5);

        let x =
            centerX - 90 + col*50;

        let y =
            200 - row*55;

        if(item.type==="x"){

            drawBox(
                x,
                y,
                item.label,
                item.negative
            );

        }else{

            drawBall(
                x,
                y,
                item.label,
                item.negative
            );
        }
    });
}

// ===================================
// BOX
// ===================================

function drawBox(x,y,label,negative){

    ctx.save();

   ctx.fillStyle =
    negative
    ? "#e11d48"
    : "#84cc16";

    roundRect(
        x,
        y,
        42,
        42,
        10
    );

    ctx.fill();

ctx.fillStyle =
    negative
    ? "#fde047"
    : "white";

ctx.font="bold 14px Arial";

ctx.textAlign = "center";
ctx.textBaseline = "middle";
ctx.fillText(
    label,
    x+21,
    y+22
);

    ctx.restore();
}


// ===================================
// KUGEL
// ===================================

function drawBall(x,y,label,negative){

    ctx.save();

   ctx.beginPath();

ctx.arc(
    x,
    y,
    18,
    0,
    Math.PI*2
);

ctx.fillStyle =
    negative
    ? "#f43f5e"
    : "#0ea5e9";
    ctx.fill();

    ctx.fillStyle="white";

ctx.font="bold 14px Arial";

ctx.textAlign = "center";
ctx.textBaseline = "middle";
ctx.fillText(
    label,
    x,
    y+1
);

    ctx.restore();
}


// ===================================
// OPERATIONEN
// ===================================

function applyOperation(op,val){

    if(op==="+"){

        equation.left.c += val;
        equation.right.c += val;
    }

    if(op==="-"){

        equation.left.c -= val;
        equation.right.c -= val;
    }

    redraw();
}

function applyMultiply(val){

    equation.left.x *= val;
    equation.left.c *= val;

    equation.right.x *= val;
    equation.right.c *= val;

    redraw();
}

// ===================================
// ×(-1)
// ===================================

function multiplyByNegativeOne(){

    equation.left.x *= -1;
    equation.left.c *= -1;

    equation.right.x *= -1;
    equation.right.c *= -1;

    redraw();
}

function applyDivide(val){

    equation.left.x /= val;
    equation.left.c /= val;

    equation.right.x /= val;
    equation.right.c /= val;

    redraw();
}

// ===================================
// X ADDITION / SUBTRAKTION
// ===================================

function applyXOperation(op,val){

    if(op === "+"){

        equation.left.x += val;
        equation.right.x += val;
    }

    if(op === "-"){

        equation.left.x -= val;
        equation.right.x -= val;
    }

    redraw();
}


// ===================================
// X MULTIPLIKATION
// ===================================

function applyXMultiply(val){

    equation.left.x *= val;
    equation.right.x *= val;

    redraw();
}


// ===================================
// X DIVISION
// ===================================

function applyXDivide(val){

    equation.left.x /= val;
    equation.right.x /= val;

    redraw();
}
// ===================================
// +x / -x
// ===================================

function applySingleX(op){

    if(op === "+"){

        equation.left.x += 1;
        equation.right.x += 1;
    }

    if(op === "-"){

        equation.left.x -= 1;
        equation.right.x -= 1;
    }

    redraw();
}


// ===================================
// ·x
// ===================================

function multiplyByX(){

    // Zahlen werden zu x
    equation.left.x += equation.left.c;
    equation.right.x += equation.right.c;

    equation.left.c = 0;
    equation.right.c = 0;

    redraw();
}


// ===================================
// ÷x
// ===================================

function divideByX(){

    // einfache symbolische Division

    if(equation.left.x !== 0){

        equation.left.c =
            equation.left.c / equation.left.x;

        equation.left.x = 1;
    }

    if(equation.right.x !== 0){

        equation.right.c =
            equation.right.c / equation.right.x;

        equation.right.x = 1;
    }

    redraw();
}

// ===================================
// VEREINFACHEN
// ===================================

function simplifyEquation(){

    // gleiche x entfernen
    let commonX =
        Math.min(
            Math.abs(equation.left.x),
            Math.abs(equation.right.x)
        );

    if(
        equation.left.x > 0 &&
        equation.right.x > 0
    ){

        equation.left.x -= commonX;
        equation.right.x -= commonX;
    }

    // gleiche Zahlen entfernen
    let commonC =
        Math.min(
            Math.abs(equation.left.c),
            Math.abs(equation.right.c)
        );

    if(
        equation.left.c > 0 &&
        equation.right.c > 0
    ){

        equation.left.c -= commonC;
        equation.right.c -= commonC;
    }

    redraw();
}


// ===================================
// ROUNDED RECT
// ===================================

function roundRect(x,y,w,h,r){

    ctx.beginPath();

    ctx.moveTo(x+r,y);

    ctx.lineTo(x+w-r,y);

    ctx.quadraticCurveTo(
        x+w,
        y,
        x+w,
        y+r
    );

    ctx.lineTo(x+w,y+h-r);

    ctx.quadraticCurveTo(
        x+w,
        y+h,
        x+w-r,
        y+h
    );

    ctx.lineTo(x+r,y+h);

    ctx.quadraticCurveTo(
        x,
        y+h,
        x,
        y+h-r
    );

    ctx.lineTo(x,y+r);

    ctx.quadraticCurveTo(
        x,
        y,
        x+r,
        y
    );

    ctx.closePath();
}

// ===================================
// DIVISION DROPDOWN
// ===================================

function divideDropdown(value){

    if(value === "")
        return;

    applyDivide(Number(value));
}


// Start
loadEquation();

</script>

</body>
</html>
